    <script>
    (function () {
      var track = document.getElementById("carousel-track");
      var counter = document.getElementById("carousel-current");
      var prev = document.getElementById("carousel-prev");
      var next = document.getElementById("carousel-next");
      if (!track) return;

      var total = track.children.length;
      var idx = 0;
      var autoTimer;

      function go(i) {
        idx = (i % total + total) % total;
        track.style.transform = "translateX(-" + (idx * 100) + "%)";
        counter.textContent = idx + 1;
      }

      function resetAuto() {
        clearInterval(autoTimer);
        autoTimer = setInterval(function () { go(idx + 1); }, 3000);
      }

      prev.addEventListener("click", function () { go(idx - 1); resetAuto(); });
      next.addEventListener("click", function () { go(idx + 1); resetAuto(); });

      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft") { go(idx - 1); resetAuto(); }
        if (e.key === "ArrowRight") { go(idx + 1); resetAuto(); }
      });

      var startX = 0;
      var dragging = false;
      track.addEventListener("pointerdown", function (e) {
        startX = e.clientX;
        dragging = true;
      });
      document.addEventListener("pointerup", function (e) {
        if (!dragging) return;
        dragging = false;
        var diff = e.clientX - startX;
        if (Math.abs(diff) > 40) { go(idx + (diff < 0 ? 1 : -1)); resetAuto(); }
      });

      resetAuto();
    })();
    </script>
